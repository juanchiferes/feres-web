<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>feres — arquitectura</title>

<style>
  @font-face {
    font-family: 'Plain';
    src: url('fonts/Plain-Thin.otf') format('opentype');
    font-weight: 100;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Plain';
    src: url('fonts/Plain-Light.otf') format('opentype');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Plain';
    src: url('fonts/Plain-Regular.otf') format('opentype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Plain';
    src: url('fonts/Plain-Medium.otf') format('opentype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
</style>

<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --color-bg: #f5f5f3;
    --color-text: #1a1a1a;
    --color-text-secondary: #999;
    --color-border: #d4d4d0;
    --color-dot: #ccc;
    --font: 'Plain', 'Helvetica Neue', Helvetica, sans-serif;
  }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    background-color: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    cursor: none;
  }

  /* ── DOT GRID ── */
  .dot-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image: radial-gradient(circle, var(--color-dot) 0.8px, transparent 0.8px);
    background-size: 28px 28px;
    opacity: 0;
    animation: fadeIn 2s ease forwards 1.2s;
  }

  /* ── INVERT CIRCLE (follows cursor) ── */
  .invert-circle {
    position: fixed;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    backdrop-filter: invert(1);
    -webkit-backdrop-filter: invert(1);
    transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .invert-circle.on-link {
    width: 280px;
    height: 280px;
  }

  /* ── HERO ── */
  .hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: var(--font);
    font-size: clamp(4rem, 10vw, 10rem);
    font-weight: 400;
    line-height: 1;
    letter-spacing: 0.03em;
    color: var(--color-text);
  }

  .hero-title .word {
    display: inline-block;
    overflow: hidden;
    vertical-align: top;
  }

  .hero-title .letter {
    display: inline-block;
    opacity: 0;
    transform: translateY(100%);
    animation: letterUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                text-shadow 0.35s ease;
    will-change: transform;
  }

  /* ── CONTACT ── */
  .contact {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 120px 40px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .contact-label {
    font-family: var(--font);
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    color: var(--color-text-secondary);
    margin-bottom: 48px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .contact-label.visible { opacity: 1; transform: translateY(0); }

  .contact-email {
    font-family: var(--font);
    font-size: clamp(1.4rem, 3.5vw, 2.8rem);
    font-weight: 300;
    letter-spacing: 0.02em;
    color: var(--color-text);
    text-decoration: none;
    position: relative;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease 0.1s, transform 0.8s ease 0.1s;
  }

  .contact-email.visible { opacity: 1; transform: translateY(0); }

  .contact-email::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 100%;
    height: 1px;
    background: var(--color-border);
    transition: background 0.3s ease;
  }

  .contact-email:hover::after { background: var(--color-text); }

  .contact-address {
    font-family: var(--font);
    font-size: 0.8rem;
    font-weight: 300;
    line-height: 1.8;
    color: var(--color-text-secondary);
    margin-top: 48px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease 0.2s, transform 0.8s ease 0.2s;
  }

  .contact-address.visible { opacity: 1; transform: translateY(0); }

  .contact-social {
    display: flex;
    gap: 32px;
    margin-top: 40px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
  }

  .contact-social.visible { opacity: 1; transform: translateY(0); }

  .contact-social a {
    font-family: var(--font);
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--color-text-secondary);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .contact-social a:hover { color: var(--color-text); }

  /* ── FOOTER ── */
  .footer {
    padding: 40px;
    border-top: 1px solid var(--color-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .footer-studio {
    font-family: var(--font);
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--color-text-secondary);
  }

  .footer-year {
    font-family: var(--font);
    font-size: 0.65rem;
    font-weight: 300;
    color: var(--color-text-secondary);
  }

  /* ── KEYFRAMES ── */
  @keyframes letterUp {
    0% { opacity: 0; transform: translateY(100%); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    body { cursor: auto; }
    .invert-circle { display: none; }
    .contact { padding: 80px 24px; }
    .footer { padding: 28px 24px; flex-direction: column; gap: 12px; }
  }

  a { cursor: none; }
</style>
</head>
<body>

<div class="dot-grid"></div>
<div class="invert-circle" id="invertCircle"></div>

<section class="hero" id="heroSection">
  <h1 class="hero-title" id="heroTitle"></h1>
</section>

<section class="contact" id="contacto">
  <span class="contact-label reveal-contact">contacto</span>
  <a href="mailto:contacto@estudioferes.com" class="contact-email reveal-contact">contacto@estudioferes.com</a>
  <div class="contact-address reveal-contact">
    Asunción 3890<br>
    Villa Devoto, CABA<br>
    Buenos Aires, Argentina
  </div>
  <div class="contact-social reveal-contact">
    <a href="https://instagram.com/feres.arq" target="_blank">Instagram</a>
  </div>
</section>

<footer class="footer">
  <span class="footer-studio">© feres</span>
  <span class="footer-year">2024</span>
</footer>

<script>
  // ── SPLIT "feres" ──
  const title = document.getElementById('heroTitle');
  const wordEl = document.createElement('span');
  wordEl.className = 'word';

  'feres'.split('').forEach((char, i) => {
    const l = document.createElement('span');
    l.className = 'letter';
    l.textContent = char;
    l.style.animationDelay = `${0.1 + i * 0.06}s`;
    l.dataset.index = i;
    wordEl.appendChild(l);
  });
  title.appendChild(wordEl);

  // ── MAGNETIC LETTERS ──
  const letters = document.querySelectorAll('.hero-title .letter');
  const hero = document.getElementById('heroSection');
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let heroActive = false;

  hero.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; heroActive = true; });
  hero.addEventListener('mouseleave', () => { heroActive = false; });

  function tick() {
    letters.forEach(letter => {
      const r = letter.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = mx - cx;
      const dy = my - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const radius = 280;

      if (heroActive && dist < radius) {
        const force = Math.pow(1 - dist / radius, 1.6);
        const px = -dx * force * 0.2;
        const py = -dy * force * 0.15;
        const rot = dx * force * 0.012;
        const sc = 1 + force * 0.08;
        letter.style.transform = `translate(${px}px, ${py}px) rotate(${rot}deg) scale(${sc})`;
        letter.style.textShadow = `${px * 0.3}px ${py * 0.3}px ${force * 20}px rgba(26,26,26,${force * 0.05})`;
      } else {
        letter.style.transform = '';
        letter.style.textShadow = 'none';
      }
    });
    requestAnimationFrame(tick);
  }
  setTimeout(() => requestAnimationFrame(tick), 1000);

  // ── INVERT CIRCLE CURSOR ──
  const circle = document.getElementById('invertCircle');
  let cX = 0, cY = 0, tX = 0, tY = 0;

  document.addEventListener('mousemove', e => { tX = e.clientX; tY = e.clientY; });

  // Expand on links
  document.querySelectorAll('a').forEach(el => {
    el.addEventListener('mouseenter', () => circle.classList.add('on-link'));
    el.addEventListener('mouseleave', () => circle.classList.remove('on-link'));
  });

  (function loop() {
    cX += (tX - cX) * 0.12;
    cY += (tY - cY) * 0.12;
    circle.style.left = cX + 'px';
    circle.style.top = cY + 'px';
    requestAnimationFrame(loop);
  })();

  // ── SCROLL REVEAL ──
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.2 });

  document.querySelectorAll('.reveal-contact').forEach(el => obs.observe(el));
</script>

</body>
</html>
